<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Manager — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; transform: translateX(110%); }
    }
    .toast-enter { animation: slideIn  0.22s ease forwards; }
    .toast-leave { animation: fadeOut  0.22s ease forwards; }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .modal-card { animation: modalIn 0.18s ease forwards; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">

        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-sm">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
          </div>
          <div>
            <h1 class="text-base font-semibold text-gray-900 leading-tight">Garage Manager</h1>
            <p class="text-xs text-gray-400 leading-tight">Admin Dashboard</p>
          </div>
        </div>

        <button id="btn-add-vehicle"
          class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          Add Vehicle
        </button>

      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">

    <!-- Stats row -->
    <div id="stats" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>

    <!-- Table card -->
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm">

      <!-- Toolbar -->
      <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 px-5 py-3 border-b border-gray-100">
        <div id="filter-tabs" class="flex items-center gap-1 flex-wrap"></div>
        <div class="relative w-full sm:w-64">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
               fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" />
          </svg>
          <input id="search" type="text" placeholder="Search plate or customer…"
            class="w-full pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400" />
        </div>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-xs font-medium text-gray-500 uppercase tracking-wide">
              <th class="text-left px-5 py-3">Plate</th>
              <th class="text-left px-5 py-3">Customer</th>
              <th class="text-left px-5 py-3">Phone</th>
              <th class="text-left px-5 py-3">Status</th>
              <th class="text-left px-5 py-3">Est. Completion</th>
              <th class="text-left px-5 py-3">Added</th>
              <th class="px-5 py-3 w-16"></th>
            </tr>
          </thead>
          <tbody id="vehicle-tbody"></tbody>
        </table>

        <!-- Empty state -->
        <div id="empty-state" class="hidden py-20 flex flex-col items-center justify-center text-center px-4">
          <div class="w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h9a2 2 0 002-2z" />
            </svg>
          </div>
          <p class="text-gray-700 font-medium" id="empty-title">No vehicles yet</p>
          <p class="text-gray-400 text-sm mt-1" id="empty-sub">Click "Add Vehicle" to get started.</p>
        </div>

        <!-- Loading skeleton -->
        <div id="loading-state" class="py-12 flex items-center justify-center gap-3 text-gray-400 text-sm">
          <svg class="w-5 h-5 animate-spin text-blue-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg>
          Loading vehicles…
        </div>
      </div>
    </div>
  </main>

  <!-- ── Add / Edit Modal ─────────────────────────────────────────────────── -->
  <div id="modal-overlay"
    class="fixed inset-0 z-50 hidden flex items-center justify-center bg-gray-900/50 backdrop-blur-sm px-4">
    <div id="modal-card"
      class="modal-card bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">

      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 id="modal-title" class="text-base font-semibold text-gray-900">Add Vehicle</h2>
        <button id="btn-modal-close"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form id="vehicle-form" class="px-6 py-5 space-y-4" novalidate>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="f-plate">
            License Plate <span class="text-red-500">*</span>
          </label>
          <input id="f-plate" type="text" required placeholder="e.g. 12-345-67"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   uppercase placeholder-gray-400 disabled:bg-gray-50 disabled:text-gray-500" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="f-name">
            Customer Name <span class="text-red-500">*</span>
          </label>
          <input id="f-name" type="text" required placeholder="Full name"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="f-phone">
            Phone Number <span class="text-red-500">*</span>
          </label>
          <input id="f-phone" type="tel" required placeholder="+972 50 000 0000"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="f-status">Status</label>
          <select id="f-status"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="in_inspection">In Inspection</option>
            <option value="waiting_parts">Waiting Parts</option>
            <option value="in_progress">In Progress</option>
            <option value="ready">Ready</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="f-completion">
            Estimated Completion
          </label>
          <input id="f-completion" type="datetime-local"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <!-- Error banner -->
        <div id="form-error"
          class="hidden flex items-center gap-2 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span id="form-error-msg"></span>
        </div>

        <div class="flex items-center justify-between pt-1">
          <button type="button" id="btn-delete"
            class="hidden px-3 py-2 text-sm font-medium text-red-600 hover:text-red-700
                   hover:bg-red-50 rounded-lg transition-colors">
            Delete Vehicle
          </button>
          <div class="flex gap-2 ml-auto">
            <button type="button" id="btn-modal-cancel"
              class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900
                     hover:bg-gray-100 rounded-lg transition-colors">
              Cancel
            </button>
            <button type="submit" id="btn-submit"
              class="px-4 py-2 text-sm font-medium text-white bg-blue-600
                     hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors
                     disabled:opacity-60 disabled:cursor-not-allowed">
              Add Vehicle
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- ── API Key Modal ───────────────────────────────────────────────────── -->
  <div id="apikey-overlay"
    class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-gray-900/50 backdrop-blur-sm px-4">
    <div id="apikey-card"
      class="modal-card bg-white rounded-2xl shadow-2xl w-full max-w-sm">

      <div class="px-6 pt-6 pb-2 flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <div class="flex-1">
          <h2 class="text-base font-semibold text-gray-900">Admin API Key Required</h2>
          <p class="text-sm text-gray-500 mt-0.5">
            Enter the admin key to access the garage. It will be kept for this session only.
          </p>
        </div>
      </div>

      <form id="apikey-form" class="px-6 pt-4 pb-5 space-y-4" novalidate>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="apikey-input">
            API Key
          </label>
          <input id="apikey-input" type="password" autocomplete="off" spellcheck="false"
            placeholder="••••••••••••"
            class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm font-mono
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                   placeholder-gray-400" />
        </div>

        <div id="apikey-error"
          class="hidden flex items-center gap-2 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span id="apikey-error-msg"></span>
        </div>

        <div class="flex gap-2 justify-end">
          <button type="button" id="btn-apikey-cancel"
            class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900
                   hover:bg-gray-100 rounded-lg transition-colors">
            Cancel
          </button>
          <button type="submit" id="btn-apikey-submit"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600
                   hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors
                   disabled:opacity-60 disabled:cursor-not-allowed">
            Unlock
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Toast container ─────────────────────────────────────────────────── -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="app.js"></script>
</body>
</html>
